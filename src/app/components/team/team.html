<section id="team" class="section section--soft">
  <div class="section__inner reveal">
    <p class="section__eyebrow"><i class="fa-solid fa-users"></i> Team</p>
    <h2 class="section__title">Experienced people, calm delivery.</h2>
    <p class="section__lead">
      Meet the operators, designers, and engineers who keep projects moving with care and clarity.
    </p>

    <div class="team-grid">
      @for (member of members; track member.name) {
        <article class="card team-card">
          <img [src]="member.image" [alt]="member.name" />
          <div>
            <h3>{{ member.name }}</h3>
            <p>{{ member.role }}</p>
            <div class="socials" aria-label="Social links">
              <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
              <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
              <a href="#" aria-label="Dribbble"><i class="fa-brands fa-dribbble"></i></a>
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
