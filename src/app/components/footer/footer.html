<footer class="footer">
  <div class="footer__inner">
    <div>
      <a class="footer__brand" href="#home" (click)="$event.preventDefault(); sectionSelected.emit('home')">DySi</a>
      <p>Modern digital systems for teams that care about clarity, speed, and reliable growth.</p>
      <div class="footer__socials">
        <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
        <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
      </div>
    </div>

    <div>
      <h3>Important Links</h3>
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Careers</a>
    </div>

    <div>
      <h3>Quick Navigation</h3>
      @for (link of links; track link.id) {
        <a href="#{{ link.id }}" (click)="$event.preventDefault(); sectionSelected.emit(link.id)">{{ link.label }}</a>
      }
    </div>

    <form class="newsletter">
      <h3>Newsletter</h3>
      <label>
        <span>Email address</span>
        <input type="email" placeholder="you@example.com" />
      </label>
      <button class="btn btn--primary" type="submit">Subscribe</button>
    </form>
  </div>
  <p class="copyright">Copyright &copy; 2026 DySi. All rights reserved.</p>
</footer>
