<div class="page" [class.dark-theme]="isDarkTheme">

  <div class="theme-toggle">
    <button (click)="toggleTheme()">
      {{ isDarkTheme ? '☀ Light Mode' : '🌙 Dark Mode' }}
    </button>
  </div>

  <div class="tabs-container">

    <div class="tabs">

      <button class="tab" [class.active]="activeTab === 'settings'" (click)="activeTab = 'settings'">
        Settings
      </button>

      <button class="tab" [class.active]="activeTab === 'dashboard'" (click)="activeTab = 'dashboard'">
        Dashboard
      </button>

      <button class="tab" [class.active]="activeTab === 'users'" (click)="activeTab = 'users'">
        Users
      </button>

      <button class="tab" [class.active]="activeTab === 'analytics'" (click)="activeTab = 'analytics'">
        Analytics
      </button>

    </div>

    <div class="tab-content">
      <div *ngIf="activeTab === 'settings'">
        <app-settings></app-settings>
      </div>

      <div *ngIf="activeTab === 'dashboard'">
        <h2>Dashboard</h2>
        <p>Modern dashboard content here...</p>
      </div>

      <div *ngIf="activeTab === 'users'">
        <h2>Users</h2>
        <p>Users management content...</p>
      </div>

      <div *ngIf="activeTab === 'analytics'">
        <h2>Analytics</h2>
        <p>Analytics reports content...</p>
      </div>
    </div>

  </div>

</div>
