@if (isLoading()) {
  <div class="loader" aria-label="Loading">
    <div class="loader__mark"></div>
    <p>DySi</p>
  </div>
}

<app-header
  [activeSection]="activeSection()"
  [isDarkTheme]="isDarkTheme()"
  (sectionSelected)="scrollToSection($event)"
  (themeToggled)="toggleTheme()"
/>

@if (isLandingRoute()) {
  <main>
    <app-home (primaryAction)="scrollToSection('contact')" />
    <app-about />
    <app-services />
    <app-team />
    <app-feedback />
    <app-contact />
  </main>

  <app-footer (sectionSelected)="scrollToSection($event)" />
}

@if (showBackToTop()) {
  <button class="back-to-top" type="button" aria-label="Back to top" (click)="scrollToTop()">
    <i class="fa-solid fa-arrow-up"></i>
  </button>
}

<router-outlet />
